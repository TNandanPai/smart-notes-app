<!DOCTYPE html>
<html>
<head>
  <title>Signup - My Notes App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard auth-page">
  <h2><i class="fa-solid fa-seedling" style="margin-right: 10px;"></i>Signup</h2>

  <div class="auth-container">
    <div style="position: relative;">
      <i class="fa-solid fa-user-plus" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
      <input type="text" id="signupUsername" placeholder="Username" style="padding-left: 45px;">
    </div>
    <div style="position: relative;">
      <i class="fa-solid fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
      <input type="password" id="signupPassword" placeholder="Password (optional)" style="padding-left: 45px;">
    </div>
    <button onclick="signup()">Create Account</button>

    <div style="text-align: center; margin: 15px 0; color: var(--text-muted); font-size: 14px;">
      ────── or ──────
    </div>

    <button onclick="registerSecretCode()" style="background: linear-gradient(135deg, #32CD32, #228B22);">
      <i class="fa-solid fa-key" style="margin-right: 8px;"></i>
      Register with Secret Code Only
    </button>
  </div>

  <p>
    Already have an account?
    <a href="login.html">Login</a>
  </p>
</div>

<script src="script.js"></script>
</body>
</html>
